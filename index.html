<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>族谱视图</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
body {
  font-family: sans-serif;
  margin: 0;
  padding: 16px;
  background: #f7f7f7;
}
h2 { margin-top: 0; }
.toolbar { margin-bottom: 16px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.toolbar input { width: 220px; padding: 6px; }
.toolbar button, .toolbar a { padding: 6px 12px; }
.panel {
  background: white;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 16px;
}
.row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.card {
  min-width: 120px;
  padding: 10px 14px;
  border: 2px solid steelblue;
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
}
.marriage {
  border-color: #d48806;
  background: #fff7e6;
}
.child {
  border-color: #52c41a;
}
.note {
  color: #666;
  margin-top: 6px;
}
.sub-title {
  margin-bottom: 10px;
  font-weight: bold;
}
.suggest-box {
  width: 240px;
  border: 1px solid #ddd;
  background: white;
  max-height: 180px;
  overflow-y: auto;
}
.suggest-item {
  padding: 6px 8px;
  cursor: pointer;
}
.suggest-item:hover {
  background: #f5f5f5;
}
svg {
  border: 1px solid #ddd;
  background: #fafafa;
}
.link {
  fill: none;
  stroke: #bbb;
  stroke-width: 2px;
}
.person-box {
  fill: #ffffff;
  stroke: steelblue;
  stroke-width: 2px;
  rx: 6;
  ry: 6;
}
.marriage-box {
  fill: #fff7e6;
  stroke: #d48806;
  stroke-width: 2px;
  rx: 6;
  ry: 6;
}
.node-text {
  font-size: 14px;
  dominant-baseline: middle;
  text-anchor: middle;
  pointer-events: none;
}
.error-box {
  color: #c62828;
  background: #fff1f0;
  border: 1px solid #ffa39e;
  border-radius: 8px;
  padding: 12px;
}
.empty-box {
  color: #666;
  background: #fff;
  border: 1px dashed #ccc;
  border-radius: 8px;
  padding: 12px;
}
</style>
</head>
<body>

<h2>族谱视图</h2>

<div class="toolbar">
  <input id="personId" placeholder="输入人物ID，例如 p12 / a12 / 任意已有ID">
  <input id="searchName" placeholder="输入姓名搜索" oninput="suggestPerson()">
  <button onclick="loadCurrent()">查看</button>
  <button onclick="switchMode('view')">关系视图</button>
  <button onclick="switchMode('tree')">树图视图</button>
  <a href="/editor.html" target="_blank">打开录入页</a>
</div>

<div id="suggest_list" class="suggest-box"></div>
<div id="app"></div>

<script>
let currentMode = 'view';

function escapeHtml(str) {
  return String(str || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

async function requestJson(url, options = {}) {
  const r = await fetch(url, options);
  const text = await r.text();

  let data = null;
  try {
    data = text ? JSON.parse(text) : null;
  } catch (e) {
    data = null;
  }

  if (!r.ok) {
    throw new Error((data && data.error) || text || ('请求失败：' + r.status));
  }
  return data;
}

function showError(message) {
  document.getElementById('app').innerHTML =
    `<div style="color:#c62828;padding:12px;border:1px solid #ffa39e;background:#fff1f0;">${escapeHtml(message || '加载失败')}</div>`;
}

function showEmpty(message) {
  document.getElementById('app').innerHTML =
    `<div style="color:#666;padding:12px;border:1px dashed #ccc;background:#fff;">${escapeHtml(message || '暂无数据')}</div>`;
}

function switchMode(mode) {
  currentMode = mode;
  loadCurrent();
}

function jumpTo(id) {
  document.getElementById('personId').value = id;
  loadCurrent();
}

async function suggestPerson() {
  const name = document.getElementById('searchName').value.trim();
  const box = document.getElementById('suggest_list');

  if (!name) {
    box.innerHTML = "";
    return;
  }

  try {
    const list = await requestJson('/person/suggest?name=' + encodeURIComponent(name));
    box.innerHTML = (list || []).map(p => `
      <div class="suggest-item" onclick="pickSuggest('${String(p.id || '').replaceAll("'", "\\'")}')">
        ${escapeHtml(p.name || '')} (${escapeHtml(p.id || '')})
      </div>
    `).join('');
  } catch (e) {
    box.innerHTML = "";
  }
}

function pickSuggest(id) {
  document.getElementById('personId').value = id;
  document.getElementById('suggest_list').innerHTML = "";
  loadCurrent();
}

function personCard(p, cls = "") {
  return `
    <div class="card ${cls}" onclick="jumpTo('${String(p.id || '').replaceAll("'", "\\'")}')">
      <div>${escapeHtml(p.name || '')}</div>
      <div class="note">${escapeHtml(p.id || '')}</div>
    </div>
  `;
}

function marriageBlock(m) {
  const spouses = (m.spouses || []).map(p => personCard(p)).join("");
  const children = (m.children || []).map(p => personCard(p, "child")).join("");

  return `
    <div class="panel marriage">
      <div class="sub-title">婚姻：${escapeHtml(m.marriage_id || '')}</div>
      <div class="row">${spouses || '<div class="note">无配偶信息</div>'}</div>
      <div class="note" style="margin-top:12px;">子女</div>
      <div class="row" style="margin-top:8px;">${children || '<div class="note">暂无子女</div>'}</div>
    </div>
  `;
}

function adoptionBlock(a) {
  if (!a) return "";
  const fromHtml = (a.from || []).map(p => personCard(p)).join("");
  const toHtml = (a.to || []).map(p => personCard(p)).join("");

  return `
    <div class="panel">
      <div class="sub-title">过继信息</div>
      <div class="note">原父母</div>
      <div class="row" style="margin-top:8px;">${fromHtml || '<div class="note">无</div>'}</div>
      <div class="note" style="margin-top:12px;">过继父母</div>
      <div class="row" style="margin-top:8px;">${toHtml || '<div class="note">无</div>'}</div>
      <div class="note" style="margin-top:12px;">备注：${escapeHtml(a.note || '')}</div>
    </div>
  `;
}

async function loadView(id) {
  const data = await requestJson('/family_view?id=' + encodeURIComponent(id));

  if (!data || !data.center) {
    showEmpty('未找到该人物');
    return;
  }

  const parents = (data.parents || []).map(p => personCard(p)).join("");
  const marriages = (data.marriages || []).map(marriageBlock).join("");

  document.getElementById('app').innerHTML = `
    <div class="panel">
      <div class="sub-title">当前人物</div>
      <div class="row">${personCard(data.center)}</div>
    </div>

    <div class="panel">
      <div class="sub-title">父母</div>
      <div class="row">${parents || '<div class="note">暂无父母信息</div>'}</div>
    </div>

    ${adoptionBlock(data.adoption)}

    <div class="sub-title">婚姻与子女</div>
    ${marriages || '<div class="panel"><div class="note">暂无婚姻信息</div></div>'}
  `;
}

/**
 * 兼容不同树节点字段
 */
function getNodeName(data) {
  return data.name || data.person_name || data.label || data.title || "";
}

function getNodeId(data) {
  return data.id || data.person_id || "";
}

function getNodeType(data) {
  return data.type || "person";
}

function getNodeChildren(data) {
  if (Array.isArray(data.children)) return data.children;
  if (Array.isArray(data.nodes)) return data.nodes;
  return [];
}

function normalizeNode(data) {
  // 根节点：/tree 返回的是 TreeNode，真正的人物在 data.person
  if (data && data.person) {
    const rootPerson = data.person || {};
    return {
      id: rootPerson.id || "",
      name: rootPerson.name || "",
      type: "person",
      label: rootPerson.name || rootPerson.id || "",
      children: (data.children || []).map(child => ({
        id: child.id || "",
        name: child.name || "",
        type: "person",
        label: child.name || child.id || "",
        children: []
      }))
    };
  }

  // 普通人物节点
  return {
    id: data.id || "",
    name: data.name || "",
    type: "person",
    label: data.name || data.id || "",
    children: []
  };
}
async function loadTree(id) {
  try {
    const data = await requestJson('/tree?id=' + encodeURIComponent(id));
    console.log('tree data = ', data);
    drawTree(data);
  } catch (e) {
    showError(e.message);
  }
}
function estimateBoxWidth(d) {
  const text = d.data.label || "";
  const minWidth = 100;
  const charWidth = 16;
  return Math.max(minWidth, text.length * charWidth + 24);
}
function drawTree(rootData) {
  const app = document.getElementById('app');
  app.innerHTML = "";

  if (!rootData) {
    showEmpty('暂无树图数据');
    return;
  }

  const normalized = normalizeNode(rootData);
  const root = d3.hierarchy(normalized);

  // 竖版树
  const treeLayout = d3.tree().nodeSize([140, 100]);
  treeLayout(root);

  const nodes = root.descendants();
  const links = root.links();

  const minX = d3.min(nodes, d => d.x) || 0;
  const maxX = d3.max(nodes, d => d.x) || 0;
  const minY = d3.min(nodes, d => d.y) || 0;
  const maxY = d3.max(nodes, d => d.y) || 0;

  const margin = { top: 50, right: 80, bottom: 50, left: 80 };
  const width = maxX - minX + margin.left + margin.right + 220;
  const height = maxY - minY + margin.top + margin.bottom + 140;

  const svg = d3.select('#app')
    .append('svg')
    .attr('width', Math.max(width, 900))
    .attr('height', Math.max(height, 500));

  const g = svg.append('g')
    .attr('transform', `translate(${margin.left - minX + 50}, ${margin.top - minY + 30})`);

  g.selectAll('.link')
    .data(links)
    .enter()
    .append('path')
    .attr('class', 'link')
    .attr('d', d3.linkVertical()
      .x(d => d.x)
      .y(d => d.y)
    );

  const node = g.selectAll('.node')
    .data(nodes)
    .enter()
    .append('g')
    .attr('class', 'node')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('cursor', 'pointer')
    .on('click', (_, d) => {
      if (d.data.id) {
        jumpTo(d.data.id);
      }
    });

  node.append('rect')
    .attr('x', d => -estimateBoxWidth(d) / 2)
    .attr('y', -22)
    .attr('width', d => estimateBoxWidth(d))
    .attr('height', 44)
    .attr('class', 'person-box');

  node.append('text')
    .attr('class', 'node-text')
    .text(d => d.data.label || '');
}

async function loadCurrent() {
  const id = document.getElementById('personId').value.trim();

  if (!id) {
    showEmpty('请先输入人物ID');
    return;
  }

  try {
    if (currentMode === 'tree') {
      await loadTree(id);
    } else {
      await loadView(id);
    }
  } catch (e) {
    showError(e.message);
  }
}
</script>

</body>
</html>
