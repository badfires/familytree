<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>族谱录入</title>
<style>
body { font-family: sans-serif; padding: 20px; }
h1 { margin-top: 0; }
h2 { margin-top: 28px; }
label { display:block; margin:8px 0 4px; }
input, textarea { width: 360px; padding: 6px; box-sizing: border-box; }
button { margin-top: 10px; padding: 8px 16px; margin-right: 8px; }
.row { margin-bottom: 12px; }
.result { margin-top: 10px; color: green; white-space: pre-wrap; }
.error { color: #c62828; }
.help { color: #666; font-size: 12px; margin-top: 4px; }
.suggest-box {
  width: 374px;
  border: 1px solid #ddd;
  max-height: 180px;
  overflow-y: auto;
  background: white;
}
.suggest-item {
  padding: 6px 8px;
  cursor: pointer;
}
.suggest-item:hover {
  background: #f5f5f5;
}
.panel {
  border: 1px solid #ddd;
  padding: 16px;
  border-radius: 8px;
  margin-bottom: 20px;
}
.inline-tip {
  color: #888;
  font-size: 12px;
}
</style>
</head>
<body>

<h1>族谱录入页</h1>

<div class="panel">
  <h2>人物搜索联想</h2>
  <div class="row">
    <label>姓名关键字</label>
    <input id="search_name" oninput="suggestPerson()">
  </div>
  <div id="suggest_list" class="suggest-box"></div>
</div>

<div class="panel">
  <h2>新增 / 编辑人物</h2>
  <div class="row">
    <label>ID</label>
    <input id="p_id" placeholder="新增时可留空，系统自动生成">
    <div class="help">新增时不用填写，保存成功后会自动回填；读取 / 更新时需要填写已有 ID。</div>
  </div>
  <div class="row"><label>姓名</label><input id="p_name"></div>
  <div class="row"><label>性别</label><input id="p_gender" placeholder="male / female"></div>
  <div class="row"><label>出生日期</label><input id="p_birth_date"></div>
  <div class="row"><label>出生地点</label><input id="p_birth_place"></div>
  <div class="row"><label>去世日期</label><input id="p_death_date"></div>
  <div class="row"><label>安葬地点</label><input id="p_burial_place"></div>
  <div class="row"><label>父亲ID</label><input id="p_father"></div>
  <div class="row"><label>母亲ID</label><input id="p_mother"></div>
  <div class="row"><label>生平</label><textarea id="p_bio"></textarea></div>
  <div class="row"><label>备注</label><textarea id="p_note"></textarea></div>
  <button onclick="createPerson()">保存人物</button>
  <button onclick="loadPerson()">读取人物</button>
  <button onclick="updatePerson()">更新人物</button>
  <div id="person_result" class="result"></div>
</div>
<div class="panel">
  <h2>人物模板与CSV导入</h2>

  <div class="row">
    <button type="button" onclick="downloadPeopleTemplate()">下载人物CSV模板</button>
  </div>

  <div class="row" style="margin-top:12px;">
    <label>选择 people.csv</label>
    <input type="file" id="people_csv_file" accept=".csv">
  </div>

  <div class="row">
    <button type="button" onclick="importPeopleCSV()">导入人物CSV</button>
  </div>

  <div id="people_csv_result" class="result"></div>
</div>
<div class="panel">
  <h2>新增 / 编辑婚姻</h2>
  <div class="row">
    <label>婚姻ID</label>
    <input id="m_id" placeholder="新增时可留空，系统自动生成">
    <div class="help">新增时不用填写，保存成功后会自动回填；读取 / 更新时需要填写已有 ID。</div>
  </div>
  <div class="row"><label>丈夫ID</label><input id="m_husband"></div>
  <div class="row"><label>妻子ID</label><input id="m_wife"></div>
  <div class="row"><label>结婚日期</label><input id="m_date"></div>
  <div class="row"><label>备注</label><textarea id="m_note"></textarea></div>
  <button onclick="createMarriage()">保存婚姻</button>
  <button onclick="loadMarriage()">读取婚姻</button>
  <button onclick="updateMarriage()">更新婚姻</button>
  <div id="marriage_result" class="result"></div>
</div>

<div class="panel">
  <h2>绑定子女到婚姻</h2>
  <div class="row"><label>婚姻ID</label><input id="mc_marriage"></div>
  <div class="row"><label>子女ID</label><input id="mc_child"></div>
  <button onclick="addMarriageChild()">绑定</button>
  <div id="mc_result" class="result"></div>
</div>

<div class="panel">
  <h2>新增过继</h2>
  <div class="row">
    <label>过继ID</label>
    <input id="a_id" placeholder="新增时可留空，系统自动生成">
    <div class="help">新增时不用填写，保存成功后会自动回填。</div>
  </div>
  <div class="row"><label>人物ID</label><input id="a_person"></div>
  <div class="row"><label>原父ID</label><input id="a_ff"></div>
  <div class="row"><label>原母ID</label><input id="a_fm"></div>
  <div class="row"><label>继父ID</label><input id="a_tf"></div>
  <div class="row"><label>继母ID</label><input id="a_tm"></div>
  <div class="row"><label>备注</label><textarea id="a_note"></textarea></div>
  <button onclick="createAdoption()">保存过继</button>
  <div id="adoption_result" class="result"></div>
</div>

<script>
function setResult(id, message, isError = false) {
  const el = document.getElementById(id);
  el.className = 'result' + (isError ? ' error' : '');
  el.innerText = message || '';
}

function escapeHtml(str) {
  return String(str || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function fillPersonForm(p) {
  document.getElementById('p_id').value = p.id || '';
  document.getElementById('p_name').value = p.name || '';
  document.getElementById('p_gender').value = p.gender || '';
  document.getElementById('p_birth_date').value = p.birth_date || '';
  document.getElementById('p_birth_place').value = p.birth_place || '';
  document.getElementById('p_death_date').value = p.death_date || '';
  document.getElementById('p_burial_place').value = p.burial_place || '';
  document.getElementById('p_father').value = p.father_id || '';
  document.getElementById('p_mother').value = p.mother_id || '';
  document.getElementById('p_bio').value = p.bio || '';
  document.getElementById('p_note').value = p.note || '';
}

function fillMarriageForm(m) {
  document.getElementById('m_id').value = m.id || '';
  document.getElementById('m_husband').value = m.husband_id || '';
  document.getElementById('m_wife').value = m.wife_id || '';
  document.getElementById('m_date').value = m.marriage_date || '';
  document.getElementById('m_note').value = m.note || '';
}

function fillAdoptionForm(a) {
  document.getElementById('a_id').value = a.id || '';
  document.getElementById('a_person').value = a.person_id || '';
  document.getElementById('a_ff').value = a.from_father_id || '';
  document.getElementById('a_fm').value = a.from_mother_id || '';
  document.getElementById('a_tf').value = a.to_father_id || '';
  document.getElementById('a_tm').value = a.to_mother_id || '';
  document.getElementById('a_note').value = a.note || '';
}

async function requestJson(url, options = {}) {
  const r = await fetch(url, options);
  const text = await r.text();

  let data = null;
  try {
    data = text ? JSON.parse(text) : null;
  } catch (e) {
    data = null;
  }

  if (!r.ok) {
    throw new Error((data && data.error) || text || ('请求失败：' + r.status));
  }

  return data;
}

async function suggestPerson() {
  const name = document.getElementById('search_name').value.trim();
  const box = document.getElementById('suggest_list');

  if (!name) {
    box.innerHTML = "";
    return;
  }

  try {
    const list = await requestJson('/person/suggest?name=' + encodeURIComponent(name));
    box.innerHTML = (list || []).map(p => `
      <div class="suggest-item" onclick="pickPersonById('${String(p.id || '').replaceAll("'", "\\'")}')">
        ${escapeHtml(p.name || '')} (${escapeHtml(p.id || '')})
      </div>
    `).join('');
  } catch (e) {
    box.innerHTML = '';
  }
}

async function pickPersonById(id) {
  document.getElementById('p_id').value = id;
  await loadPerson();
  document.getElementById('suggest_list').innerHTML = "";
}

function collectPerson() {
  return {
    id: document.getElementById('p_id').value.trim(),
    name: document.getElementById('p_name').value.trim(),
    gender: document.getElementById('p_gender').value.trim(),
    birth_date: document.getElementById('p_birth_date').value.trim(),
    birth_place: document.getElementById('p_birth_place').value.trim(),
    death_date: document.getElementById('p_death_date').value.trim(),
    burial_place: document.getElementById('p_burial_place').value.trim(),
    father_id: document.getElementById('p_father').value.trim(),
    mother_id: document.getElementById('p_mother').value.trim(),
    bio: document.getElementById('p_bio').value.trim(),
    note: document.getElementById('p_note').value.trim()
  };
}

function collectMarriage() {
  return {
    id: document.getElementById('m_id').value.trim(),
    husband_id: document.getElementById('m_husband').value.trim(),
    wife_id: document.getElementById('m_wife').value.trim(),
    marriage_date: document.getElementById('m_date').value.trim(),
    note: document.getElementById('m_note').value.trim()
  };
}

function collectAdoption() {
  return {
    id: document.getElementById('a_id').value.trim(),
    person_id: document.getElementById('a_person').value.trim(),
    from_father_id: document.getElementById('a_ff').value.trim(),
    from_mother_id: document.getElementById('a_fm').value.trim(),
    to_father_id: document.getElementById('a_tf').value.trim(),
    to_mother_id: document.getElementById('a_tm').value.trim(),
    note: document.getElementById('a_note').value.trim()
  };
}

async function createPerson() {
  try {
    const created = await requestJson('/person/create', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(collectPerson())
    });
    fillPersonForm(created || {});
    setResult('person_result', '保存成功，系统编号：' + (created?.id || ''));
  } catch (e) {
    setResult('person_result', e.message, true);
  }
}

async function loadPerson() {
  const id = document.getElementById('p_id').value.trim();
  if (!id) {
    setResult('person_result', '请先输入人物ID', true);
    return;
  }

  try {
    const p = await requestJson('/person/get?id=' + encodeURIComponent(id));
    fillPersonForm(p || {});
    setResult('person_result', '已读取人物：' + id);
  } catch (e) {
    setResult('person_result', e.message, true);
  }
}

async function updatePerson() {
  const body = collectPerson();
  if (!body.id) {
    setResult('person_result', '更新人物必须先填写人物ID', true);
    return;
  }

  try {
    const r = await fetch('/person/update', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const text = await r.text();
    if (!r.ok) {
      throw new Error(text || '更新失败');
    }
    setResult('person_result', text || ('更新成功：' + body.id));
  } catch (e) {
    setResult('person_result', e.message, true);
  }
}

async function createMarriage() {
  try {
    const created = await requestJson('/marriage/create', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(collectMarriage())
    });
    fillMarriageForm(created || {});
    setResult('marriage_result', '保存成功，系统编号：' + (created?.id || ''));
  } catch (e) {
    setResult('marriage_result', e.message, true);
  }
}

async function loadMarriage() {
  const id = document.getElementById('m_id').value.trim();
  if (!id) {
    setResult('marriage_result', '请先输入婚姻ID', true);
    return;
  }

  try {
    const m = await requestJson('/marriage/get?id=' + encodeURIComponent(id));
    fillMarriageForm(m || {});
    setResult('marriage_result', '已读取婚姻：' + id);
  } catch (e) {
    setResult('marriage_result', e.message, true);
  }
}

async function updateMarriage() {
  const body = collectMarriage();
  if (!body.id) {
    setResult('marriage_result', '更新婚姻必须先填写婚姻ID', true);
    return;
  }

  try {
    const r = await fetch('/marriage/update', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const text = await r.text();
    if (!r.ok) {
      throw new Error(text || '更新失败');
    }
    setResult('marriage_result', text || ('更新成功：' + body.id));
  } catch (e) {
    setResult('marriage_result', e.message, true);
  }
}

async function addMarriageChild() {
  const marriageID = document.getElementById('mc_marriage').value.trim();
  const childID = document.getElementById('mc_child').value.trim();

  if (!marriageID || !childID) {
    setResult('mc_result', '婚姻ID和子女ID都不能为空', true);
    return;
  }

  try {
    const r = await fetch(
      '/marriage/add_child?marriage_id=' + encodeURIComponent(marriageID) +
      '&child_id=' + encodeURIComponent(childID),
      { method: 'POST' }
    );
    const text = await r.text();
    if (!r.ok) {
      throw new Error(text || '绑定失败');
    }
    setResult('mc_result', text || '绑定成功');
  } catch (e) {
    setResult('mc_result', e.message, true);
  }
}

async function createAdoption() {
  try {
    const created = await requestJson('/adoption/create', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(collectAdoption())
    });
    fillAdoptionForm(created || {});
    setResult('adoption_result', '保存成功，系统编号：' + (created?.id || ''));
  } catch (e) {
    setResult('adoption_result', e.message, true);
  }
}
async function downloadPeopleTemplate() {
  window.location.href = '/person/export_template';
}

async function importPeopleCSV() {
  const fileInput = document.getElementById('people_csv_file');
  const resultEl = document.getElementById('people_csv_result');

  if (!fileInput.files || fileInput.files.length === 0) {
    resultEl.className = 'result error';
    resultEl.innerText = '请先选择CSV文件';
    return;
  }

  const formData = new FormData();
  formData.append('file', fileInput.files[0]);

  try {
    const r = await fetch('/person/import_csv', {
      method: 'POST',
      body: formData
    });

    const text = await r.text();
    let data = null;
    try {
      data = text ? JSON.parse(text) : null;
    } catch (e) {
      data = null;
    }

    if (!r.ok) {
      throw new Error((data && data.error) || text || '导入失败');
    }

    resultEl.className = 'result';
    resultEl.innerText = data?.message || ('导入成功，数量：' + (data?.imported || 0));
  } catch (e) {
    resultEl.className = 'result error';
    resultEl.innerText = e.message;
  }
}
</script>

</body>
</html>
